# docker-compose.yml — local HydrAIDE for the example tree.
#
# One command (`docker compose up -d`) brings up:
#   1. hydraide-init  — generates TLS material into ./certificate (runs once)
#   2. hydraide       — the HydrAIDE server, depends on init completion
#
# The ./certificate directory is bind-mounted into both services AND visible
# to host-side Go processes that run the recipes, so no env vars are needed
# for the in-tree examples.

services:
  hydraide-init:
    image: alpine:3.20
    container_name: hydraide-examples-init
    volumes:
      - ./certificate:/certs
      - ../../../../scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/gen-dev-certs.sh"]
    restart: "no"

  hydraide:
    build:
      context: ../../../..
      dockerfile: docs/sdk/go/examples/Dockerfile.dev
    image: hydraide-examples:dev
    container_name: hydraide-examples
    depends_on:
      hydraide-init:
        condition: service_completed_successfully
    ports:
      - "5980:4444"
    environment:
      - LOG_LEVEL=info
      - LOG_TIME_FORMAT=2006-01-02 15:04:05
      - SYSTEM_RESOURCE_LOGGING=false
      - GRAYLOG_ENABLED=false
      - GRPC_MAX_MESSAGE_SIZE=10485760
      - GRPC_SERVER_ERROR_LOGGING=true
      - HYDRAIDE_DEFAULT_CLOSE_AFTER_IDLE=600
      - HYDRAIDE_DEFAULT_WRITE_INTERVAL=1
      - HYDRAIDE_DEFAULT_FILE_SIZE=8192
    volumes:
      - ./certificate:/hydraide/certificate
      - hydraide-settings:/hydraide/settings
      - hydraide-data:/hydraide/data
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4445/health"]
      interval: 5s
      timeout: 3s
      start_period: 5s
      retries: 5

volumes:
  hydraide-settings:
  hydraide-data:

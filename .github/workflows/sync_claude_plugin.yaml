name: Sync Claude plugin mirror

on:
  push:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - '.claude/commands/**'
      - 'docs/features/**'
      - '.github/workflows/sync_claude_plugin.yaml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout HydrAIDE monorepo
        uses: actions/checkout@v5
        with:
          path: hydraide

      - name: Checkout hydraide/claude plugin repo
        uses: actions/checkout@v5
        with:
          repository: hydraide/claude
          path: claude
          ssh-key: ${{ secrets.CLAUDE_PLUGIN_DEPLOY_KEY }}

      - name: Sync skills, commands, and feature docs into the plugin tree
        run: |
          set -euo pipefail
          # The plugin repo is a Claude Code marketplace with one plugin under plugins/hydraide.
          PLUGIN_DIR=claude/plugins/hydraide

          rm -rf "$PLUGIN_DIR/skills" "$PLUGIN_DIR/commands" "$PLUGIN_DIR/docs/features"
          mkdir -p "$PLUGIN_DIR/skills" "$PLUGIN_DIR/commands" "$PLUGIN_DIR/docs/features"

          if [ -d hydraide/.claude/skills ]; then
            cp -r hydraide/.claude/skills/* "$PLUGIN_DIR/skills/"
          fi
          if [ -d hydraide/.claude/commands ]; then
            cp -r hydraide/.claude/commands/* "$PLUGIN_DIR/commands/"
          fi
          if [ -d hydraide/docs/features ]; then
            cp hydraide/docs/features/*.md "$PLUGIN_DIR/docs/features/"
          fi

      - name: Rewrite relative links inside SKILL.md files
        run: |
          set -euo pipefail
          # In the monorepo, SKILL.md is at .claude/skills/<name>/SKILL.md (depth 3 from repo root).
          # In the plugin tree, SKILL.md is at plugins/hydraide/skills/<name>/SKILL.md.
          # Two levels up from the SKILL.md ends at plugins/hydraide/, so the relative path
          # to feature docs is ../../docs/features/ in both cases (the plugin keeps its own
          # docs/features/ tree alongside skills/).
          # Other ../../../ refs (app/, sdk/, proto/, docs/install/, docs/hydraidectl/,
          # docs/benchmarks/, CLAUDE.md, docs/why-hydraide.md) get rewritten to absolute
          # GitHub URLs so they remain navigable from the plugin repo.
          for f in claude/plugins/hydraide/skills/*/SKILL.md; do
            sed -i 's|\.\./\.\./\.\./docs/features/|../../docs/features/|g' "$f"
            sed -i 's|\.\./\.\./\.\./|https://github.com/hydraide/hydraide/blob/main/|g' "$f"
          done

      - name: Commit and push if changed
        working-directory: claude
        run: |
          set -euo pipefail
          git config user.name "hydraide-sync-bot"
          git config user.email "hydraide-sync-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          SOURCE_SHA="${GITHUB_SHA}"
          git commit -m "sync: skills, commands, and feature docs from hydraide@${SOURCE_SHA:0:7}

          Auto-synced from hydraide/hydraide commit ${SOURCE_SHA}.
          Source of truth lives in the HydrAIDE monorepo. To change anything
          here, open a PR against hydraide/hydraide."
          git push origin main
